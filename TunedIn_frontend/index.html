<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TunePort - Playlist Transfer</title>
    <style>
    
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #111827;
        }
        p {
            color: #6b7280;
            margin-bottom: 2rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem;
            margin: 1rem 0;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-sizing: border-box;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-spotify {
            background-color: #1DB954;
            color: white;
        }
        .btn-youtube {
            background-color: #FF0000;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>TunePort</h1>
        <p>Connect your accounts to transfer playlists.</p>

        <a href="https://tunedin-1bno.onrender.com/auth/spotify" class="btn btn-spotify">
            Connect Spotify
        </a>
        
        <a href="https://tunedin-1bno.onrender.com/auth/google" class="btn btn-youtube">
            Connect YouTube Music
        </a>
    </div>

</body>
</html>
